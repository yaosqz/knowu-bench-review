      preferred_sort: "Price Ascending"
      impulse_buy_threshold: "¥30 (decides alone); ¥200+ (must call son first)"
      coupon_behavior: "Always searches for coupons before checkout"
      trust_signals: ["High sales volume", "Reviews with photos", "Free shipping"]

  preferences:
    # --- 饮食偏好 (Diet & Food) ---
    diet:
      taste_profile: "Light, soft, stewed — avoids spicy, raw/cold, and deep-fried"
      allergy_or_restriction: "Lactose intolerant; low-sodium diet (hypertension)"
      staple_preference: "Steamed buns & porridge over rice"
      grocery_habit: "Buys at morning farmers market (06:30-07:30); compares prices across stalls"
      bulk_buy_items: ["Eggs", "Flour", "Cooking Oil", "Rice"]
      grandson_exception: "Will buy fried chicken, cola, and snacks for grandson despite personal dislike"

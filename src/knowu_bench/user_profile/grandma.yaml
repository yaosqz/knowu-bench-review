      theme: "Light Mode"
      font_size: "Largest" # 对应 Settings App 关键测试点

  # --- 3. 行为模式 (Habits - 映射到 15 个可用 App) ---
  habits:
    # --- 1. 晨间资讯 (Chrome + Mastodon) ---
    morning_weather:
      description: "Checks weather in Beijing."
      trigger:
        time_range: ["08:00", "08:30"]
        context_cue: "Wake up alarm dismiss"
        simulation_datetime: "2026-02-10 08:10:00"
      action:
        type: "browse_info"
        sequence: 
          - "Open Chrome -> Search 'Beijing Weather Today'"

    # --- 3b. [新增] 诈骗短信拦截 ---
    # 与 routine/scam_sms_intercept.py 对齐：收到可疑链接短信时，先征求用户，再执行拉黑/举报。
    scam_sms_intercept:
      description: "Blocks and reports suspicious SMS senders after user confirmation."
      trigger:
        simulation_datetime: "2026-05-26 08:15:00"
        sender_phone: "+8617099887766"
        sms_content: "[Good News] Free box of organic eggs! Pick up at community gate. Click http://scam.site/eggs to reserve."
        suspicious_keywords: ["free eggs", "health supplement", "click to claim", "http://"]
      action:
        type: "block_and_report_sms"
        block_number: "+8617099887766"
        content_keywords: ["free eggs", "click", "claim"]
        detail: "If a suspicious promotional SMS contains gift/health bait and a link, ask user first, then block/report sender when accepted."

    # --- 4. 亲情互动 (打电话) ---
    daily_family_call:
      description: "Calls son (Qiang) on Saturday evenings to check in."
      trigger:
        day_of_week: "Saturday"
        time_range: ["19:30", "20:00"]
        context_cue: "Saturday evening check-in"
        simulation_datetime: "2026-02-10 19:35:00"
      action:
        type: "initiate_call"
        app: "Contacts" 
        target_name: "Son (Qiang)"
        target_phone: "139-8888-7777"  # 与 app_contacts 中 Son (Qiang) 一致
        fallback_action: "Send Message via Mattermost" 

    # --- 5. [新增] 相册清理习惯 (Gallery) ---
    # 依据日志：王淑兰会在下午整理相册，删除模糊/重复照片和较长视频以释放空间
    gallery_cleanup:
      description: "Cleans screenshot album by removing old files first."
      trigger:
        type: "time_event"
        day_of_week: "Tuesday"
        time_range: ["14:10", "14:20"]
        simulation_datetime: "2026-05-26 14:15:00"
      action:
        type: "app_interaction"
        app: "Gallery"
        operation: "delete_older_than"
        cleanup_policy:
          older_than_days: 30
        target_album: "Screenshots"
        detail: "Open Gallery -> Screenshots, delete screenshots older than 30 days, keep recent ones."

    #新增，测试周末闹钟设置
    weekend_alarm:
      wakeup_time: "6:00am"
      favoriate_ringtone: "Krypton"


      secondary_transport: "Walking (max 800m — knee arthritis)"
      avoid_transport: ["Subway (afraid of escalators)", "Ride-hailing (too expensive)"]
      taxi_exception: "Takes taxi only if carrying grandson or heavy rain"
      route_preference: "Fewest transfers — would rather ride longer than switch buses"
      familiar_bus_routes: ["Route 52", "Route 108", "Route 300"]
      navigation_app: "Map (must enable voice navigation — can't read screen while walking)"

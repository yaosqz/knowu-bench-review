  identity:
    full_name: "Aiden Lin"
    age: 34
    occupation: "Associate Professor / AI Lab Director"
    employer: "Peking University (PKU)"

    auth_documents:
      id_card: "11010119900614XXXX"
      passport: "E12345678"
      frequent_flyer: "CA-99887766 (Star Alliance)"
    contact_info:
      phone: "+86 138-0000-8888"
      email_work: "aiden.lin@pku.edu.cn"
      email_personal: "aiden.ai.researcher@gmail.com"

  # --- 2. 环境感知 (Context) [来源: main] ---
  locations:
    home:
      address: "北京市海淀区知春路 6 号院 锦秋国际大厦"
      label: "Home"
      latitude: 39.9795
      longitude: 116.3382
      instructions: "Leave at door, do not ring bell after 10 PM."
    work:
      address: "北京市海淀区颐和园路 5 号 北京大学理科一号楼"
      label: "Lab"
      latitude: 39.9869
      longitude: 116.3059
      instructions: "Front desk / Call student for pickup."

  digital_context:
    devices:
      - "MacBook Pro (Primary)"
      - "Android Flagship (Mobile)"
      - "Linux Server (Remote)"
    system_settings:
      language: "English (US)"
      theme: "Dark Mode (Always)"
      time_zone: "Asia/Shanghai (GMT+8)"
    security:
      auth_method: "Biometric (FaceID/TouchID) preferred over password"

  # --- 3. 行为模式 (Habits) [来源: main，完整保留] ---
  habits:
    # --- 1. 信息获取惯例 ---
    morning_routine:
      description: "Checks AlphaXiv and HuggingFace Papers every morning."
      trigger:
        time_range: ["08:25", "08:35"]
        context_cue: "Device unlocked"
      action:
        type: "browse_info"
        sequence:
          - "Open Chrome -> https://www.alphaxiv.org"
          - "Open Chrome -> https://huggingface.co/papers"

    # --- 2. 周报惯例 ---
    weekly_report:
      description: "Sends weekly progress summary to the Dean."
      trigger:
        day_of_week: "Friday"
        time_range: ["16:55", "17:05"]
        context_cue: "File 'Weekly_Report.pdf' exists in Documents"
      action:
        type: "send_email"
        recipient: "dean@pku.edu.cn"
        content_keywords: ["Weekly Report", "attached"]

    # --- 3. 低电量续航模式 ---
    low_battery_saver:
      description: "Enables power saving mode when battery is low to stay connected."
      trigger:
        condition: "Battery level <= 15%"
        context_cue: "System Low Battery Warning"
      action:
        type: "change_settings"
        settings: ["power_saving_mode"]

    # --- 4. 深度工作模式 ---
    deep_work_block:
      description: "Protects morning time for writing, declines meetings."
      trigger:
        time_range: ["09:00", "11:30"]
        day_of_week: ["Mon", "Tue", "Wed", "Thu", "Fri"]
      action:
        type: "set_dnd_mode"
        auto_decline_meetings: true

    # --- 5. 紧急消息响应 (On-Call) ---
    on_call_response:
      description: "Immediately acknowledges critical server alerts during off-hours."
      trigger:
        simulation_datetime: "2026-02-12 20:00:00"
        app: "Mattermost"
        team: "AGI_Reasoning_Lab"
        channel: "AI-Research"
        alert_message: "🚨 CRITICAL: Server 500 Error detected in Cluster-A. API response time exceeded 5s."
      action:
        type: "send_message"
        reply_keywords: ["ack", "checking now", "received"]

    # --- 6. 会议预读 ---
    pre_meeting_prep:
      description: "Prepares for meetings by reviewing relevant technical specifications 5 minutes before the start time."
      trigger:
        type: "time_event"
        simulation_datetime: "2026-05-20 18:24:47"
        meeting_title: "Paper Sharing"
        meeting_start: "2026-05-20 18:25:00"
        meeting_end: "2026-05-20 21:00:00"
        reminder_minutes: 0
        offset_minutes: -5
        calendar_event_keywords: ["Paper Sharing", "Paper Discussion", "Paper Review"]
      action:
        type: "open_file"
        file_name: "Agent_Learning_via_Early_Experience.pdf"
        file_source: "src/knowu_bench/cache/users/aiden_lin/Agent_Learning_via_Early_Experience.pdf"
        file_name_pattern: "{Paper_Title}.pdf"
        location: "Documents/"
        detail: "5 minutes before the paper sharing meeting, open the corresponding PDF in Documents/."

    # --- 7. 周末关闹钟 ---
    weekend_sleeper:
      description: "Disables the 07:30 AM work alarm on Friday nights to avoid waking up early on weekends."
      trigger:
        type: "time_event"
        time: "23:00"
        days: ["Friday"]
      action:
        type: "app_interaction"
        app: "Clock"
        operation: "disable_alarm"
        target: "07:30"
        detail: "On Friday at 23:00, open Clock app and turn off the 07:30 alarm."

    # --- 8. 截图清理 ---
    gallery_cleanup:
      description: "Weekly screenshot cleanup with age-based retention."
      trigger:
        type: "time_event"
        day_of_week: "Sunday"
        time_range: ["22:10", "22:20"]
        simulation_datetime: "2026-05-24 22:15:00"
      action:
        type: "app_interaction"
        app: "Gallery"
        operation: "delete_older_than"
        cleanup_policy:
          older_than_days: 30
        target_album: "Screenshots"
        detail: "Open Gallery -> Screenshots, delete screenshots older than 30 days, keep recent ones."

    # --- 9. 联系人自动保存 ---
    contact_saver:
      description: "Automatically saves new contacts from SMS when people introduce themselves."
      trigger:
        type: "received_sms"
        pattern: "this is [Name]"
      action:
        type: "save_contact"
        app: "Contacts"
        detail: "If an SMS says 'Hi, this is Bob', open Contacts and save 'Bob' with the sender's number."

  # --- 4. 偏好设置 (Preferences) ---
  preferences:

    # --- 饮食偏好 (Diet & Food) ---
    diet:
      coffee: "Iced Americano, No Sugar, Extra Shot (Order at 14:00)"
      diet_type: "Daytime: Quick, filling cafeteria meals (Beijing-style staples like noodles and stir-fries, or Japanese bowls). Evening: Heavy comfort food."
      soft_drinks: "Sugar-free Coca-Cola (Absolutely no Pepsi)"
      delivery_platform: "Tuantuan (Has membership, preferred over Chilemei)"
      cuisine_preference: ["Japanese", "Beijing cuisine", "Sichuan (Dinner only)"]
      special_notes: "Lactose intolerant — always orders oat milk. Dislikes peanuts (Requests 'no peanuts' even for Kung Pao chicken)."
      dinner_preference: "Craves Kung Pao chicken for dinner as a stress-relief comfort food." 
      delivery_general_remark: "Please add extra rice"                           

    # --- 购物偏好 (Shopping) ---
    shopping:
      brands: ["Logitech", "Apple"]
      online_platforms:
        preferred: "Taodian (Preferred over Jingdian)"                
        secondary: "Jingdian (Alternative, faster delivery)"
      delivery_courier: "First choice: SF Express; Second choice: Zhongtong Express."  
      payment_method: "Alipay preferred over WeChat Pay (bound to reimbursement account)"
      price_sensitivity:
        general: "Low for productivity tools; high for non-essential items"
        clothes_threshold: "If the price of clothes exceeds 100 yuan, considered relatively expensive."  
      reimbursement_note: "Always requests fapiao (invoice) for work-related purchases"
      shoe: { shoe_size_eu: 41, shoe_color: white }
      clothes: "No black clothes and no one-piece outfits"
      computer: "Personal use: Apple (MacBook)."

    # --- 出行偏好 (Travel & Transport) ---
    travel:
      seat: "Aisle (Need to work on laptop)"
      daily_commute:
        primary_transport: "Subway (Line 10 + Line 4)"
        subway_payment: "Alipay transit QR code (乘车码小程序)"
      weather_adaptation:
        normal_weather: "Subway (default daily commute)"
        rain_or_extreme_weather: "Didi Premier (礼橙专车) — avoids walking to station in bad weather"
        late_night: "Didi Premier (after subway stops running, ~23:00)"
      ride_hailing:
        app: "Didi"
        preferred_tier: "Premier (礼橙专车)"
        payment: "Alipay"
      transport: "subway"
      flight_preference:
        airline: "Air China preferred (Star Alliance member CA-99887766)"
        time: "Morning flights preferred (Arrive early, work in afternoon)"
      navigation_app: "Maps (preferred navigation app)"
    

    # --- App偏好 (App & Digital) [来源: main，无冲突] ---
    apps:
      browser: "Chrome"
      email_client: "Mail"
      messaging:
        work_team: "Mattermost (Lab internal communication)"
        project_communication: "Mattermost channel 'AI-Research' (Uses this strictly for all CS academic projects, paper discussions, and lab sync meetings)"
        sms: "Messages (For SMS-based contacts)"
      calendar: "Calendar (Primary scheduling tool)"
      file_management: "Files"
      document_viewer: "OpenDocument (For viewing PDFs)"
      photos: "Gallery"
      search: "Google"
      news_and_papers:
        - "AlphaXiv (via Chrome)"
        - "HuggingFace Papers (via Chrome)"
        - "Mastodon (Follows ML researchers)"

    # --- 社交偏好 (Social & Communication) ---
    social:
      communication_style: "Direct and concise; dislikes lengthy pleasantries"
      response_time:
        high_priority: "Immediate (Dean, server alerts)"
        routine: "Within 2 hours during work hours"
      meeting_preference:
        scheduling: "Avoids meetings between 9:00 - 11:30 (Deep work block)"
        duration: "Prefers 30 min max"
      social_media:
        active: ["Mastodon (Academic networking)"]
        avoid: ["Douyin/TikTok"]
        posting_preference: "Likes promoting personal academic work and research updates on Mastodon."
        default_visibility: "public"  # 学术传播需要最大曝光，公开可见
      delegation: "Delegates admin tasks to Alice Wang; gives Bob Li extra guidance on code"
      hobby:
        field_of_interest: "gui agent/personalized agent"          # [来源: mall-preference]
      share:
        photos: "User likes to share screenshots of academic papers"  # [来源: mall-preference]


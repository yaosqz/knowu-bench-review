      - user: "Mom"
        unread: false
        text: "Did you receive the money?"

  # 3. App: Settings (流量预警状态)
  app_settings:
    network:
      mobile_data:
        used: "19.5 GB"
        limit: "20.0 GB" # 接近上限，触发焦虑
      wifi: "Campus-Student-Net"
    display:
      dark_mode: true

  # 4. App: Messages (流量短信)
  app_messages:
    threads:
      - sender: "China Mobile"
        text: "[System Alert] You have used 95% of your high-speed data."
        time: "10:30 AM"
        read: false # 未读，等待处理

  # 5. App: Contacts (联系人)
  app_contacts:
    list:
      - { name: "Roommate Kevin", phone: "13922223344" }

  # 6. App: Taodian (购物车)
  app_taodian:
    cart:
      - { item: "Instant Noodles (Beef Flavor)", price: 4.50, selected: true }
      - { item: "Cola 12-Pack", price: 19.90, selected: true }

  # 7. App: Files & Docreader
  app_files:
    files:
      - path: "Downloads/OS_Project_Assignment.pdf"
        source: "src/knowu_bench/cache/users/lucas/os_assign.pdf"

  app_docreader:
    recent:
      - file: "OS_Project_Assignment.pdf"
        progress: "Page 1"

  # 8. App: Calendar
  app_calendar:
    events:
      - time: "Next Monday 08:00"
        title: "Submit OS Project OR FAIL" # 风格化的标题
        color: "Red"

  # 9. App: Mastodon
  app_mastodon:
    user: "@luke_cs"
    feed:
      - user: "@CampusDeals"
        content: "BOGO Free Burger King today! #Deal"

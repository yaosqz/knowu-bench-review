  app_gallery:
    albums:
      - name: "Memes" # [新增] 表情包相册
        content:
          - filename: "doge_head.jpg"
            source: "src/knowu_bench/cache/users/lucas/doge.jpg"
          - filename: "pepe_sad.jpg"
            source: "src/knowu_bench/cache/users/lucas/pepe.jpg"
      - name: "Screenshots"
        content:
          - filename: "kfc_coupon_yesterday.jpg" # 昨天的优惠券
            source: "src/knowu_bench/cache/users/lucas/kfc.jpg"
      - name: "Camera"
        content:
          - filename: "supermarket_receipt.jpg" # 刚拍的小票
            source: "src/knowu_bench/cache/users/lucas/receipt.jpg"

  # 2. App: Mattermost (体现聊天风格的历史记录)
  app_mattermost:
    status: "Online"
    teams:
      - name: "CS_Sophomores"
        channels:
          - name: "Dorm_404_Bros"
            unread: true
            history:
              - user: "Lucas" # 历史消息，体现风格
                text: "Bro, internet is so bad rn [Facepalm]"
